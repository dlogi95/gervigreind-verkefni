<!DOCTYPE html>
<html lang="is">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verkefni — NTV Promennt</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --red:#C0392B;--red-light:#fdf2f1;--red-mid:#f5c6c2;
  --dark:#1a1a2e;--text:#1a1a2e;
  --muted:#7f8c9a;--border:#e8ecef;--bg:#f7f8fa;--white:#fff;
  --green:#27ae60;--green-light:#eafaf1;
  --amber:#f39c12;--blue:#2980b9;--blue-light:#eaf4fb;
}
body{font-family:"DM Sans",sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
header{background:var(--dark);padding:0 1.5rem;display:flex;align-items:center;height:56px;position:sticky;top:0;z-index:100}
.logo svg{height:30px;width:auto}
.bc{background:var(--white);border-bottom:1px solid var(--border);padding:0 1.5rem;display:flex;align-items:center;gap:6px;height:44px;font-size:13px}
.bc-item{color:var(--muted);cursor:pointer}.bc-item:hover{color:var(--red)}.bc-item.active{color:var(--text);font-weight:500;cursor:default}
.bc-sep{color:var(--border);font-size:16px}
.layout{display:flex;height:calc(100vh - 100px)}
.sidebar{width:260px;min-width:260px;background:var(--white);border-right:1px solid var(--border);overflow-y:auto;display:flex;flex-direction:column}
.sb-sec{padding:1rem;border-bottom:1px solid var(--border)}
.sb-lbl{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
.sb-item{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;border-radius:8px;cursor:pointer;margin-bottom:2px}
.sb-item:hover{background:var(--bg)}.sb-item.active{background:var(--red-light)}
.sb-name{font-size:13px;font-weight:500}.sb-item.active .sb-name{color:var(--red)}
.sb-count{font-size:11px;font-family:"DM Mono",monospace;color:var(--muted);background:var(--bg);padding:1px 6px;border-radius:8px}
.btn-add-small{width:100%;background:none;border:1px dashed var(--border);border-radius:8px;padding:7px;font-size:12px;color:var(--muted);cursor:pointer;font-family:"DM Sans",sans-serif;margin-top:4px}
.btn-add-small:hover{border-color:var(--red);color:var(--red)}
.content{flex:1;overflow-y:auto;padding:1.5rem}
/* cover */
.cover{width:100%;height:180px;border-radius:12px;margin-bottom:1.5rem;overflow:hidden;position:relative;display:flex;align-items:center;justify-content:center;border:1.5px dashed var(--border);background:var(--bg)}
.cover.has-img{border-style:solid;border-color:var(--border);cursor:default}
.cover.has-col{border-style:solid;border-color:transparent;cursor:default}
.cover:not(.has-img):not(.has-col):hover{border-color:var(--red);cursor:pointer}
.cover img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.cover-ph{display:flex;flex-direction:column;align-items:center;gap:6px;color:var(--muted);text-align:center;position:relative;z-index:1}
.cover-ph-icon{font-size:32px}.cover-ph-text{font-size:12px}
.cover-acts{position:absolute;bottom:10px;right:10px;display:flex;gap:6px;align-items:center;z-index:2}
.cbtn{background:rgba(255,255,255,.93);border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-size:11px;font-family:"DM Sans",sans-serif;cursor:pointer;font-weight:500}
.cbtn:hover{background:#fff}.cbtn.red{color:var(--red);border-color:var(--red-mid)}
.cwrap{display:flex;align-items:center;background:rgba(255,255,255,.93);border:1px solid var(--border);border-radius:6px;padding:3px 6px}
.cwrap input[type=color]{width:18px;height:18px;border:none;padding:0;background:none;cursor:pointer;border-radius:3px}
.cwrap input[type=text]{width:64px;border:none;font-size:11px;font-family:"DM Mono",monospace;background:none;outline:none;color:var(--text)}
/* project */
.ph{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1.5rem}
.pt{font-size:22px;font-weight:600;margin-bottom:4px}.pm{font-size:13px;color:var(--muted)}
.btn-primary{background:var(--red);color:#fff;border:none;padding:8px 16px;border-radius:8px;font-size:13px;font-family:"DM Sans",sans-serif;font-weight:500;cursor:pointer}
.btn-primary:hover{opacity:.85}
.ugrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:12px;margin-bottom:1.5rem}
.ucard{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:16px;cursor:pointer}
.ucard:hover{border-color:var(--red);transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.08)}
.uav{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:600;margin-bottom:10px}
.uname{font-size:14px;font-weight:600;margin-bottom:2px}.ustats{font-size:12px;color:var(--muted)}
/* objectives */
.obj-block{background:var(--white);border:1px solid var(--border);border-radius:12px;margin-bottom:12px;overflow:hidden}
.obj-hdr{padding:14px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.obj-hdr:hover{background:var(--bg)}
.obj-left{display:flex;align-items:center;gap:10px}
.obj-chev{font-size:11px;color:var(--muted);transition:transform .2s;display:inline-block}
.obj-chev.open{transform:rotate(90deg)}
.obj-name{font-size:14px;font-weight:600}
.obj-right{display:flex;align-items:center;gap:8px}
.obj-prog{font-size:11px;font-family:"DM Mono",monospace;color:var(--muted);background:var(--bg);padding:2px 8px;border-radius:8px}
.obj-edit{background:none;border:none;color:var(--muted);font-size:13px;cursor:pointer;padding:2px 8px;border-radius:4px}
.obj-edit:hover{background:var(--bg);color:var(--text)}
.task-row{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid var(--border);cursor:pointer}
.task-row:last-child{border-bottom:none}.task-row:hover{background:var(--bg)}
.tcheck{width:16px;height:16px;border-radius:4px;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer}
.tcheck.done{background:var(--green);border-color:var(--green)}.tcheck.done::after{content:"✓";color:#fff;font-size:10px}
.tcheck.progress{background:var(--blue);border-color:var(--blue)}.tcheck.progress::after{content:"●";color:#fff;font-size:8px}
.tname{flex:1;font-size:13px;font-weight:500}.tname.strike{text-decoration:line-through;color:var(--muted)}
.tbadges{display:flex;align-items:center;gap:6px}
.badge{font-size:11px;font-weight:500;padding:2px 8px;border-radius:4px;font-family:"DM Mono",monospace}
.badge-high{background:#fdf2f1;color:#C0392B}.badge-mid{background:#fef9ec;color:#f39c12}.badge-low{background:#f0f7ee;color:#27ae60}
.due{font-size:11px;color:var(--muted);font-family:"DM Mono",monospace}.due.od{color:var(--red);font-weight:500}
.add-task{padding:10px 16px;font-size:12px;color:var(--muted);cursor:pointer;border-top:1px dashed var(--border)}
.add-task:hover{color:var(--red)}
.empty{text-align:center;padding:3rem 1rem;color:var(--muted)}
.empty-icon{font-size:36px;margin-bottom:12px}
.av0{background:#eaf4fb;color:#2980b9}.av1{background:#fef0ea;color:#C0392B}
.av2{background:#eafaf1;color:#27ae60}.av3{background:#fef9ec;color:#f39c12}.av4{background:#f0eefa;color:#8e44ad}
/* schedule */
.sched-wrap{margin-top:2rem}
.sched-toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.sched-title{font-size:15px;font-weight:600}
.sched-nav{display:flex;align-items:center;gap:8px}
.snav-btn{background:none;border:1px solid var(--border);border-radius:6px;width:28px;height:28px;cursor:pointer;font-size:14px;color:var(--muted);display:flex;align-items:center;justify-content:center;font-family:"DM Sans",sans-serif}
.snav-btn:hover{border-color:var(--red);color:var(--red)}
.speriod{font-size:13px;font-weight:500;min-width:160px;text-align:center}
.vtoggle{display:flex;background:var(--bg);border-radius:8px;padding:3px;gap:2px}
.vbtn{background:none;border:none;padding:5px 12px;border-radius:6px;font-size:12px;font-family:"DM Sans",sans-serif;font-weight:500;color:var(--muted);cursor:pointer}
.vbtn.active{background:var(--white);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.08)}
.sgrid{background:var(--white);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.scol-heads{display:flex;border-bottom:1px solid var(--border)}
.scol-head{flex:1;padding:8px 6px;text-align:center;font-size:11px;font-weight:600;color:var(--muted);border-right:1px solid var(--border);text-transform:uppercase;letter-spacing:.04em}
.scol-head:last-child{border-right:none}.scol-head.today{color:var(--red)}
.srows{display:flex;min-height:120px}
.scell{flex:1;border-right:1px solid var(--border);padding:6px 4px;min-height:120px}
.scell:last-child{border-right:none}.scell.today{background:#fdf9f9}
.sdaynum{font-size:11px;font-weight:600;color:var(--muted);margin-bottom:4px;text-align:center}
.sdaynum.tod{background:var(--red);color:#fff;border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center;margin:0 auto 4px}
.stask{font-size:10px;padding:2px 5px;border-radius:4px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;font-weight:500}
.stask.high{background:#fdf2f1;color:#C0392B}.stask.mid{background:#fef9ec;color:#f39c12}.stask.low{background:#f0f7ee;color:#27ae60}
.stask.done{background:var(--bg);color:var(--muted);text-decoration:line-through}
.smonth-grid{display:grid;grid-template-columns:repeat(7,1fr)}
.smonth-cell{border-right:1px solid var(--border);border-bottom:1px solid var(--border);padding:6px 5px;min-height:80px}
.smonth-cell:nth-child(7n){border-right:none}.smonth-cell.other{background:var(--bg)}.smonth-cell.tod{background:#fdf9f9}
/* modal */
.overlay{display:none;position:fixed;inset:0;background:rgba(26,26,46,.5);z-index:300;align-items:center;justify-content:center;padding:1rem}
.overlay.open{display:flex}
.modal{background:var(--white);border-radius:14px;width:100%;max-width:460px;box-shadow:0 20px 60px rgba(0,0,0,.2);display:flex;flex-direction:column;max-height:85vh}
.modal.lg{max-width:680px}
.mhdr{padding:18px 20px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.mtitle{font-size:15px;font-weight:600}
.mx{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer}
.mtabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
.mtab{padding:10px 16px;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px}
.mtab.active{color:var(--red);border-bottom-color:var(--red)}
.mpanels{flex:1;overflow-y:auto;padding:18px 20px}
.mpanel{display:none;flex-direction:column;gap:14px}.mpanel.active{display:flex}
.mfooter{padding:14px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;align-items:center;flex-shrink:0}
.mbody{padding:18px 20px;display:flex;flex-direction:column;gap:14px;overflow-y:auto}
.fg{display:flex;flex-direction:column;gap:5px}
.fl{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
.fi,.fs,.ft{border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:13px;font-family:"DM Sans",sans-serif;color:var(--text);background:var(--white);outline:none}
.fi:focus,.fs:focus,.ft:focus{border-color:var(--red)}
.ft{resize:vertical;min-height:70px}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn-cancel{background:none;border:1px solid var(--border);color:var(--muted);padding:7px 14px;border-radius:8px;font-size:13px;font-family:"DM Sans",sans-serif;cursor:pointer}
.btn-cancel:hover{border-color:var(--text);color:var(--text)}
.btn-del{background:none;border:1px solid var(--red-mid);color:var(--red);padding:7px 14px;border-radius:8px;font-size:13px;font-family:"DM Sans",sans-serif;cursor:pointer;margin-right:auto}
.btn-del:hover{background:var(--red-light)}
/* todo & files */
.todo-list{display:flex;flex-direction:column;gap:6px}
.todo-item{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--bg);border-radius:8px}
.todo-check{width:16px;height:16px;border-radius:4px;border:1.5px solid var(--border);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center}
.todo-check.checked{background:var(--green);border-color:var(--green)}.todo-check.checked::after{content:"✓";color:#fff;font-size:10px}
.todo-text{flex:1;font-size:13px}.todo-del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;padding:0 4px}
.todo-del:hover{color:var(--red)}
.todo-add{display:flex;gap:8px;margin-top:4px}
.files-list{display:flex;flex-direction:column;gap:6px}
.file-item{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--bg);border-radius:8px}
.file-icon{font-size:18px;flex-shrink:0}.file-name{flex:1;font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.file-size{font-size:11px;color:var(--muted);font-family:"DM Mono",monospace}
.file-del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;padding:0 4px}.file-del:hover{color:var(--red)}
.file-up{display:flex;align-items:center;justify-content:center;gap:8px;padding:12px;border:1.5px dashed var(--border);border-radius:8px;cursor:pointer;color:var(--muted);font-size:13px}
.file-up:hover{border-color:var(--red);color:var(--red)}

@media (max-width: 768px) {
  /* Layout: sidebar hidden by default, content full width */
  .layout { height: auto; flex-direction: column; }
  .sidebar { width: 100%; min-width: 0; height: auto; border-right: none; border-bottom: 1px solid var(--border); display: none; }
  .sidebar.open { display: flex; }
  .content { padding: 1rem; overflow-y: visible; }

  /* Header: add hamburger */
  header { padding: 0 1rem; justify-content: space-between; }
  .hamburger { display: flex; flex-direction: column; gap: 4px; cursor: pointer; padding: 6px; }
  .hamburger span { display: block; width: 20px; height: 2px; background: rgba(255,255,255,0.8); border-radius: 2px; }

  /* Breadcrumb */
  .bc { padding: 0 1rem; font-size: 12px; height: 40px; overflow-x: auto; white-space: nowrap; }

  /* Cover */
  .cover { height: 120px; border-radius: 8px; }
  .cover-acts { flex-wrap: wrap; gap: 4px; bottom: 6px; right: 6px; }
  .cwrap input[type=text] { width: 48px; }
  .cbtn { font-size: 10px; padding: 3px 7px; }

  /* Project header */
  .ph { flex-direction: column; gap: 12px; }
  .ph > div:last-child { display: flex; gap: 8px; width: 100%; }
  .ph > div:last-child .btn-primary { flex: 1; text-align: center; }
  .pt { font-size: 18px; }

  /* User cards */
  .ugrid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
  .uav { width: 32px; height: 32px; font-size: 12px; margin-bottom: 6px; }
  .uname { font-size: 13px; }

  /* Objectives */
  .obj-hdr { padding: 12px; }
  .obj-name { font-size: 13px; }
  .task-row { padding: 10px 12px; gap: 8px; }
  .tbadges { flex-direction: column; align-items: flex-end; gap: 3px; }
  .tname { font-size: 12px; }
  .badge { font-size: 10px; padding: 1px 6px; }
  .due { font-size: 10px; }

  /* Schedule */
  .sched-toolbar { flex-direction: column; gap: 10px; align-items: flex-start; }
  .sched-nav { width: 100%; justify-content: space-between; }
  .speriod { min-width: 0; flex: 1; }
  .vtoggle { width: 100%; }
  .vbtn { flex: 1; text-align: center; }
  .scol-head { font-size: 9px; padding: 6px 2px; }
  .stask { font-size: 9px; padding: 1px 3px; }
  .smonth-cell { min-height: 50px; padding: 3px 2px; }
  .sdaynum { font-size: 9px; }
  .scell { min-height: 80px; padding: 4px 2px; }

  /* Modal */
  .modal { max-width: 100%; max-height: 95vh; margin: 0; border-radius: 14px 14px 0 0; }
  .overlay { align-items: flex-end; padding: 0; }
  .modal.lg { max-width: 100%; }
  .mpanels { padding: 14px; }
  .mbody { padding: 14px; }
  .mfooter { padding: 12px 14px; }
  .fr { grid-template-columns: 1fr; }
}

@media (min-width: 769px) {
  .hamburger { display: none; }
}

.back-btn{display:none;align-items:center;gap:6px;background:none;border:none;color:var(--red);font-size:14px;font-family:"DM Sans",sans-serif;font-weight:500;cursor:pointer;padding:0;margin-bottom:1rem}
.back-btn:hover{opacity:.75}
@media(max-width:768px){.back-btn{display:flex}}
</style>
</head>

<script>
var KEY = "ntv_v4";
var db = {projects:[{
  id:1,name:"Gervigreind í dag",desc:"Facebook hópur um gervigreind",
  users:[{id:"u1",name:"Darri",color:0},{id:"u2",name:"Óli",color:1}],
  objectives:[
    {id:"o1",name:"Content",userId:"u2",open:true,tasks:[
      {id:"t1",name:"Claude content — föst dagskrá",priority:"high",due:"2025-05-31",status:"progress",desc:"",todos:[],files:[]},
      {id:"t2",name:"Velkominn póst",priority:"high",due:"2025-05-06",status:"done",desc:"",todos:[],files:[]}
    ]},
    {id:"o2",name:"Auglýsingar",userId:"u1",open:true,tasks:[
      {id:"t3",name:"Meta re-target auglýsing",priority:"high",due:"2025-05-10",status:"progress",desc:"",todos:[],files:[]},
      {id:"t4",name:"Facebook post / story",priority:"mid",due:"2025-05-08",status:"todo",desc:"",todos:[],files:[]}
    ]},
    {id:"o3",name:"Kynning",userId:"u2",open:true,tasks:[
      {id:"t5",name:"Útvarpsviðtal",priority:"mid",due:"2025-05-15",status:"todo",desc:"",todos:[],files:[]},
      {id:"t6",name:"Póstar á FB, IG, TikTok",priority:"high",due:"2025-05-07",status:"todo",desc:"",todos:[],files:[]}
    ]}
  ]
}]};

var state = {pid:1, uid:null};
var curOid = null, curTid = null;
var schedView = "week", schedOff = 0;

function load(){
  try {
    var s=localStorage.getItem(KEY);
    if(s) {
      db=JSON.parse(s);
      console.log('Gögn hlaðin:', db.projects.length, 'verkefni');
    } else {
      console.log('Engin vistuð gögn, nota default');
    }
  } catch(e) {
    console.error('Villa við að hlaða gögnum:', e);
  }
}
function save(){
  try {
    localStorage.setItem(KEY,JSON.stringify(db));
  } catch(e) {
    console.error('localStorage villa:', e);
    alert('Gögn vistuðust ekki: ' + e.message);
  }
}
function proj(){return db.projects.find(function(p){return p.id===state.pid;});}
function usr(){return state.uid?proj().users.find(function(u){return u.id===state.uid;}):null;}
function ini(n){return n.split(" ").map(function(w){return w[0];}).join("").slice(0,2).toUpperCase();}
function avCls(c){return "av"+(c%5);}
function sameDay(a,b){return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate();}
function isOD(d,s){return d&&s!=="done"&&new Date(d)<new Date();}
function fmtD(d){if(!d)return "";var p=d.split("-");return p[2]+"."+p[1]+"."+p[0];}
function fmtShort(d){var mn=["jan","feb","mar","apr","maí","jún","júl","ágú","sep","okt","nóv","des"];return d.getDate()+". "+mn[d.getMonth()];}
function fmtFull(d){var mn=["janúar","febrúar","mars","apríl","maí","júní","júlí","ágúst","september","október","nóvember","desember"];return d.getDate()+". "+mn[d.getMonth()]+" "+d.getFullYear();}
function fmtSize(b){if(!b)return "";if(b<1024)return b+" B";if(b<1048576)return Math.round(b/1024)+" KB";return (b/1048576).toFixed(1)+" MB";}
function objsFor(uid){return proj().objectives.filter(function(o){return o.userId===uid;});}
function allObjs(){return proj().objectives;}
function getTask(){var obj=proj().objectives.find(function(o){return o.id===curOid;});return obj?obj.tasks.find(function(t){return t.id===curTid;}):null;}

// ── DOM HELPERS ─────────────────────────────────────────────────
function el(tag,cls,text){var e=document.createElement(tag);if(cls)e.className=cls;if(text!=null)e.textContent=text;return e;}
function inp(cls,type,val,ph){var e=document.createElement("input");e.className=cls;e.type=type||"text";if(val!=null)e.value=val;if(ph)e.placeholder=ph;return e;}
function sel(cls,opts,val){var e=document.createElement("select");e.className=cls;opts.forEach(function(o){var op=document.createElement("option");op.value=o.value;op.textContent=o.label;if(o.value===val)op.selected=true;e.appendChild(op);});return e;}
function fg(label,input){var d=el("div","fg");var l=el("label","fl",label);d.appendChild(l);d.appendChild(input);return d;}
function btn(cls,text,cb){var b=el("button",cls,text);b.addEventListener("click",cb);return b;}

// ── COVER ───────────────────────────────────────────────────────
function getCoverImg(){return localStorage.getItem("ntv_cimg")||"";}
function getCoverCol(){return localStorage.getItem("ntv_ccol")||"";}

function buildCover(){
  var img=getCoverImg(),col=getCoverCol();
  var hasCover=img||col;
  var div=el("div","cover"+(img?" has-img":col?" has-col":""));
  if(img){var i=document.createElement("img");i.src=img;div.appendChild(i);}
  if(col&&!img){div.style.background=col;}

  var ph=el("div","cover-ph");
  ph.appendChild(el("div","cover-ph-icon","🖼"));
  ph.appendChild(el("div","cover-ph-text","Smelltu til að hlaða upp mynd eða veldu lit"));
  if(hasCover)ph.style.display="none";
  div.appendChild(ph);

  if(!hasCover){div.addEventListener("click",function(){document.getElementById("cover-file").click();});}

  // actions always visible
  var acts=el("div","cover-acts");

  var cw=el("div","cwrap");
  cw.title="Velja lit á bakgrunn";
  var ci=document.createElement("input");ci.type="color";ci.value=col||"#1a1a2e";
  ci.addEventListener("input",function(){setCoverCol(ci.value);});
  cw.appendChild(ci);
  cw.addEventListener("click",function(e){e.stopPropagation();});
  acts.appendChild(cw);

  var ubtn=btn("cbtn","Hlaða upp mynd",function(e){e.stopPropagation();document.getElementById("cover-file").click();});
  acts.appendChild(ubtn);

  var rbtn=btn("cbtn red","Fjarlægja",function(e){e.stopPropagation();removeCover();});
  if(!hasCover)rbtn.style.display="none";
  acts.appendChild(rbtn);

  div.appendChild(acts);
  return div;
}

function setCoverCol(hex){
  if(!/^#[0-9a-fA-F]{6}$/.test(hex))return;
  localStorage.setItem("ntv_ccol",hex);
  localStorage.removeItem("ntv_cimg");
  renderCT();
}
function removeCover(){
  localStorage.removeItem("ntv_cimg");
  localStorage.removeItem("ntv_ccol");
  document.getElementById("cover-file").value="";
  renderCT();
}
document.getElementById("cover-file").addEventListener("change",function(e){
  var file=e.target.files[0];if(!file)return;
  var r=new FileReader();
  r.onload=function(ev){localStorage.setItem("ntv_cimg",ev.target.result);localStorage.removeItem("ntv_ccol");renderCT();};
  r.readAsDataURL(file);
});

// ── CONTENT ─────────────────────────────────────────────────────
function renderCT(){
  var ct=document.getElementById("ct");
  ct.innerHTML="";
  var p=proj();
  if(!p){
    var e=el("div","empty");e.appendChild(el("div","empty-icon","📁"));e.appendChild(el("div","","Veldu verkefni"));
    ct.appendChild(e);return;
  }
  var u=usr();
  var objs=u?objsFor(u.id):allObjs();
  var title=u?u.name:p.name;
  var sub=u?p.name:(p.users.length+" notendur · "+p.objectives.length+" objectives");

  // cover
  ct.appendChild(buildCover());

  // back button (mobile only)
  var backBtn=el("button","back-btn","← Til baka");
  backBtn.style.display = u ? "" : "none";
  backBtn.addEventListener("click",function(){selU(null);});
  ct.appendChild(backBtn);

  // header
  var ph=el("div","ph");
  var phLeft=el("div");
  phLeft.appendChild(el("div","pt",title));
  phLeft.appendChild(el("div","pm",sub));
  ph.appendChild(phLeft);
  var phRight=el("div");phRight.style.display="flex";phRight.style.gap="8px";
  if(!u){var addUBtn=btn("btn-primary","+ Notandi",mAddUser);phRight.appendChild(addUBtn);}
  var addOBtn=btn("btn-primary","+ Objective",function(){mAddObj(u?u.id:"");});
  phRight.appendChild(addOBtn);
  ph.appendChild(phRight);
  ct.appendChild(ph);

  // user cards
  if(!u){
    var ugrid=el("div","ugrid");
    p.users.forEach(function(uu){
      var uobjs=objsFor(uu.id);
      var tasks=uobjs.reduce(function(a,o){return a.concat(o.tasks);},[]);
      var done=tasks.filter(function(t){return t.status==="done";}).length;
      var card=el("div","ucard");
      var av=el("div","uav "+avCls(uu.color),ini(uu.name));
      card.appendChild(av);
      card.appendChild(el("div","uname",uu.name));
      card.appendChild(el("div","ustats",uobjs.length+" objectives · "+done+"/"+tasks.length+" verkþættir"));
      card.addEventListener("click",(function(id){return function(){selU(id);};})(uu.id));
      ugrid.appendChild(card);
    });
    ct.appendChild(ugrid);
  }

  // objectives
  if(objs.length===0){
    var ee=el("div","empty");ee.appendChild(el("div","empty-icon","🎯"));ee.appendChild(el("div","","Engin objectives enn"));ct.appendChild(ee);
  } else {
    objs.forEach(function(obj){ct.appendChild(buildObj(obj));});
  }

  // schedule
  ct.appendChild(buildSched());
}

// ── OBJECTIVE ───────────────────────────────────────────────────
function buildObj(obj){
  var p=proj();
  var u=p.users.find(function(u){return u.id===obj.userId;});
  var done=obj.tasks.filter(function(t){return t.status==="done";}).length;

  var block=el("div","obj-block");
  var hdr=el("div","obj-hdr");

  var left=el("div","obj-left");
  var chev=el("span","obj-chev"+(obj.open?" open":""),"▶");
  left.appendChild(chev);
  left.appendChild(el("span","obj-name",obj.name));
  if(u){var av=el("div","uav "+avCls(u.color),ini(u.name));av.style.width="22px";av.style.height="22px";av.style.fontSize="10px";av.style.margin="0";left.appendChild(av);}
  hdr.appendChild(left);

  var right=el("div","obj-right");
  right.appendChild(el("span","obj-prog",done+"/"+obj.tasks.length));
  var editBtn=btn("obj-edit","···",(function(id){return function(e){e.stopPropagation();mEditObj(id);};})(obj.id));
  right.appendChild(editBtn);
  hdr.appendChild(right);

  hdr.addEventListener("click",(function(id){return function(){toggleObj(id);};})(obj.id));
  block.appendChild(hdr);

  if(obj.open){
    var tasksDiv=el("div","");
    obj.tasks.forEach(function(t){tasksDiv.appendChild(buildTaskRow(t,obj.id));});
    var addT=el("div","add-task","+ Bæta við verkþætti");
    addT.addEventListener("click",(function(id){return function(){mAddTask(id);};})(obj.id));
    tasksDiv.appendChild(addT);
    block.appendChild(tasksDiv);
  }
  return block;
}

function buildTaskRow(t,objId){
  var row=el("div","task-row");
  var check=el("div","tcheck "+t.status);
  check.addEventListener("click",(function(oid,tid){return function(e){e.stopPropagation();cycleS(oid,tid);};})(objId,t.id));
  row.appendChild(check);
  row.appendChild(el("span","tname"+(t.status==="done"?" strike":""),t.name));
  var badges=el("div","tbadges");
  var priMap={high:"badge-high",mid:"badge-mid",low:"badge-low"};
  var priLabel={high:"Hár",mid:"Miðlungs",low:"Lágur"};
  badges.appendChild(el("span","badge "+(priMap[t.priority]||"badge-mid"),priLabel[t.priority]||"Miðlungs"));
  if(t.due){var d=el("span","due"+(isOD(t.due,t.status)?" od":""),fmtD(t.due));badges.append(d);}
  row.appendChild(badges);
  row.addEventListener("click",(function(oid,tid){return function(){mEditTask(oid,tid);};})(objId,t.id));
  return row;
}

// ── SCHEDULE ────────────────────────────────────────────────────
function allTasksWithDue(){
  var p=proj(),u=usr();
  var objs=u?objsFor(u.id):allObjs();
  var result=[];
  objs.forEach(function(obj){obj.tasks.forEach(function(t){if(t.due)result.push({t:t,obj:obj});});});
  return result;
}

function buildSchedTask(x){
  var t=x.t;
  var cls="stask "+(t.status==="done"?"done":t.priority);
  var d=el("div",cls,t.name);
  d.title=t.name;
  d.addEventListener("click",(function(oid,tid){return function(){mEditTask(oid,tid);};})(x.obj.id,t.t?t.t.id:t.id));
  return d;
}

function buildSched(){
  var wrap=el("div","sched-wrap");
  var today=new Date();today.setHours(0,0,0,0);
  var tasks=allTasksWithDue();

  // toolbar
  var toolbar=el("div","sched-toolbar");
  toolbar.appendChild(el("div","sched-title","Dagskrá"));

  var nav=el("div","sched-nav");
  var prevBtn=btn("snav-btn","‹",function(){schedOff--;rebuildSched(wrap,today,tasks);});
  nav.appendChild(prevBtn);
  var periodSpan=el("span","speriod","");
  nav.appendChild(periodSpan);
  var nextBtn=btn("snav-btn","›",function(){schedOff++;rebuildSched(wrap,today,tasks);});
  nav.appendChild(nextBtn);
  var todBtn=btn("snav-btn","Í dag",function(){schedOff=0;rebuildSched(wrap,today,tasks);});
  todBtn.style.width="auto";todBtn.style.padding="0 8px";todBtn.style.fontSize="10px";
  nav.appendChild(todBtn);
  toolbar.appendChild(nav);

  var vtog=el("div","vtoggle");
  ["day","week","month"].forEach(function(v){
    var labels={day:"Dagur",week:"Vika",month:"Mánuður"};
    var vb=btn("vbtn"+(v===schedView?" active":""),labels[v],function(){
      schedView=v;schedOff=0;
      wrap.querySelectorAll(".vbtn").forEach(function(b){b.classList.remove("active");});
      vb.classList.add("active");
      rebuildSched(wrap,today,tasks);
    });
    vtog.appendChild(vb);
  });
  toolbar.appendChild(vtog);
  wrap.appendChild(toolbar);

  var gridWrap=el("div","");
  wrap.appendChild(gridWrap);
  rebuildSched(wrap,today,tasks);
  return wrap;
}

function rebuildSched(wrap,today,tasks){
  var old=wrap.querySelector(".sgrid");if(old)old.remove();
  var grid=el("div","sgrid");
  var periodSpan=wrap.querySelector(".speriod");
  var mn=["Janúar","Febrúar","Mars","Apríl","Maí","Júní","Júlí","Ágúst","September","Október","Nóvember","Desember"];
  var dayNames=["Mán","Þri","Mið","Fim","Fös","Lau","Sun"];

  if(schedView==="day"){
    var d=new Date(today);d.setDate(d.getDate()+schedOff);
    if(periodSpan)periodSpan.textContent=fmtFull(d);
    var dayTasks=tasks.filter(function(x){return sameDay(new Date(x.t.due),d);});
    var inner=el("div","");inner.style.padding="16px";
    if(dayTasks.length===0){var empty=el("div","");empty.style.cssText="color:var(--muted);font-size:13px;text-align:center;padding:2rem";empty.textContent="Engin verkefni þennan dag";inner.appendChild(empty);}
    else{dayTasks.forEach(function(x){
      var t=x.t;
      var row=el("div","stask "+(t.status==="done"?"done":t.priority));
      row.style.cssText="font-size:13px;padding:8px 12px;margin-bottom:6px;border-radius:8px;white-space:normal;cursor:pointer";
      row.textContent=t.name;
      row.addEventListener("click",(function(oid,tid){return function(){mEditTask(oid,tid);};})(x.obj.id,t.id));
      inner.appendChild(row);
    });}
    grid.appendChild(inner);

  } else if(schedView==="week"){
    var monday=new Date(today);
    var wd=monday.getDay();monday.setDate(monday.getDate()-(wd===0?6:wd-1)+schedOff*7);
    var days=[];for(var i=0;i<7;i++){var dd=new Date(monday);dd.setDate(monday.getDate()+i);days.push(dd);}
    if(periodSpan)periodSpan.textContent=fmtShort(days[0])+" – "+fmtFull(days[6]);
    var heads=el("div","scol-heads");
    days.forEach(function(dd,i){
      var h=el("div","scol-head"+(sameDay(dd,today)?" today":""),dayNames[i]+" "+dd.getDate());
      heads.appendChild(h);
    });
    grid.appendChild(heads);
    var rows=el("div","srows");
    days.forEach(function(dd){
      var cell=el("div","scell"+(sameDay(dd,today)?" today":""));
      tasks.filter(function(x){return sameDay(new Date(x.t.due),dd);}).forEach(function(x){
        var t=x.t;
        var st=el("div","stask "+(t.status==="done"?"done":t.priority),t.name);
        st.title=t.name;
        st.addEventListener("click",(function(oid,tid){return function(){mEditTask(oid,tid);};})(x.obj.id,t.id));
        cell.appendChild(st);
      });
      rows.appendChild(cell);
    });
    grid.appendChild(rows);

  } else {
    var base=new Date(today.getFullYear(),today.getMonth()+schedOff,1);
    if(periodSpan)periodSpan.textContent=mn[base.getMonth()]+" "+base.getFullYear();
    var heads2=el("div","scol-heads");
    dayNames.forEach(function(n){heads2.appendChild(el("div","scol-head",n));});
    grid.appendChild(heads2);
    var mgrid=el("div","smonth-grid");
    var start=new Date(base);
    var sw=start.getDay();start.setDate(start.getDate()-(sw===0?6:sw-1));
    var cur=new Date(start);
    for(var j=0;j<42;j++){
      var isOther=cur.getMonth()!==base.getMonth();
      var isTod=sameDay(cur,today);
      var cell2=el("div","smonth-cell"+(isOther?" other":"")+(isTod?" tod":""));
      var dn=el("div","sdaynum"+(isTod?" tod":""),String(cur.getDate()));
      if(isTod){dn.textContent=String(cur.getDate());}
      cell2.appendChild(dn);
      var cc=new Date(cur);
      tasks.filter(function(x){return sameDay(new Date(x.t.due),cc);}).forEach(function(x){
        var t=x.t;
        var st=el("div","stask "+(t.status==="done"?"done":t.priority),t.name);
        st.title=t.name;
        st.addEventListener("click",(function(oid,tid){return function(){mEditTask(oid,tid);};})(x.obj.id,t.id));
        cell2.appendChild(st);
      });
      mgrid.appendChild(cell2);
      cur.setDate(cur.getDate()+1);
    }
    grid.appendChild(mgrid);
  }
  wrap.appendChild(grid);
}

// ── ACTIONS ─────────────────────────────────────────────────────
function selP(id){state.pid=id;state.uid=null;render();}
function selU(id){state.uid=id;render();}
function toggleObj(id){var o=proj().objectives.find(function(o){return o.id===id;});if(o)o.open=!o.open;save();renderCT();}
function cycleS(oid,tid){
  var o=proj().objectives.find(function(o){return o.id===oid;});
  var t=o.tasks.find(function(t){return t.id===tid;});
  var c={todo:"progress",progress:"done",done:"todo"};
  t.status=c[t.status]||"todo";
  save();renderCT();
}

function simpleModal(title,fields,onSave,onDelete){

  openModal(title,body,foot,false);
}

function mAddTask(oid){
  var f1=inp("fi","text","","Hvað þarf að gera?");
  var f2=sel("fs",[{value:"high",label:"Hár"},{value:"mid",label:"Miðlungs"},{value:"low",label:"Lágur"}],"mid");
  var f3=inp("fi","date","","");
  var f4=sel("fs",[{value:"todo",label:"Bið"},{value:"progress",label:"Í vinnslu"},{value:"done",label:"Klárt"}],"todo");
  var row1=el("div","fr");row1.appendChild(fg("Forgangur",f2));row1.appendChild(fg("Skiladagur",f3));
  simpleModal("Nýr verkþáttur",[fg("Heiti",f1),row1,fg("Staða",f4)],function(){
    var n=f1.value.trim();if(!n)return false;
    var obj=proj().objectives.find(function(o){return o.id===oid;});
    obj.tasks.push({id:"t"+Date.now(),name:n,priority:f2.value,due:f3.value,status:f4.value,desc:"",todos:[],files:[]});
    save();renderCT();return true;
  },null);
}

function mEditTask(oid,tid){
  curOid=oid;curTid=tid;
  var obj=proj().objectives.find(function(o){return o.id===oid;});
  var t=obj.tasks.find(function(t){return t.id===tid;});
  if(!t.todos)t.todos=[];if(!t.files)t.files=[];

  // Build tabbed modal with DOM
  var wrap=el("div","");

  // tabs
  var tabsEl=el("div","mtabs");
  var panelsEl=el("div","mpanels");
  panelsEl.style.padding="18px 20px";
  panelsEl.style.overflowY="auto";

  function makeTab(label,panelEl,active){
    var tab=el("div","mtab"+(active?" active":""),label);
    var panel=el("div","mpanel"+(active?" active":""));
    panelEl(panel);
    tab.addEventListener("click",function(){
      tabsEl.querySelectorAll(".mtab").forEach(function(x){x.classList.remove("active");});
      panelsEl.querySelectorAll(".mpanel").forEach(function(x){x.classList.remove("active");});
      tab.classList.add("active");panel.classList.add("active");
    });
    tabsEl.appendChild(tab);
    panelsEl.appendChild(panel);
  }

  // Panel 0: info
  var f1=inp("fi","text",t.name,"");
  var f2=el("textarea","ft");f2.placeholder="Nánari lýsing...";f2.value=t.desc||"";
  var f3=sel("fs",[{value:"high",label:"Hár"},{value:"mid",label:"Miðlungs"},{value:"low",label:"Lágur"}],t.priority);
  var f4=inp('fi','date',t.due||'','');
  var f5=sel("fs",[{value:"todo",label:"Bið"},{value:"progress",label:"Í vinnslu"},{value:"done",label:"Klárt"}],t.status);
  makeTab("Upplýsingar",function(p){
    var row=el("div","fr");row.appendChild(fg("Forgangur",f3));row.appendChild(fg("Skiladagur",f4));
    p.appendChild(fg("Heiti",f1));p.appendChild(fg("Lýsing",f2));p.appendChild(row);p.appendChild(fg("Staða",f5));
  },true);

  // Panel 1: todos
  makeTab("To-do listi",function(p){
    var listEl=el("div","todo-list");
    function refreshTodos(){
      listEl.innerHTML="";
      if(!t.todos.length){var empty=el("div","");empty.style.cssText="font-size:13px;color:var(--muted);padding:8px 0";empty.textContent="Engir liðir enn";listEl.appendChild(empty);return;}
      t.todos.forEach(function(item,i){
        var row=el("div","todo-item");
        var chk=el("div","todo-check"+(item.done?" checked":""));
        chk.addEventListener("click",function(){item.done=!item.done;save();refreshTodos();});
        var txt=el("span","todo-text",item.text);
        if(item.done){txt.style.textDecoration="line-through";txt.style.color="var(--muted)";}
        var del2=btn("todo-del","×",function(){t.todos.splice(i,1);save();refreshTodos();});
        row.appendChild(chk);row.appendChild(txt);row.appendChild(del2);
        listEl.appendChild(row);
      });
    }
    refreshTodos();
    p.appendChild(listEl);
    var addRow=el("div","todo-add");
    var addInp=inp("fi","text","","Bæta við lið...");
    addInp.addEventListener("keydown",function(e){if(e.key==="Enter")doAdd();});
    var addB=btn("btn-primary","+",doAdd);
    function doAdd(){var v=addInp.value.trim();if(!v)return;t.todos.push({text:v,done:false});addInp.value="";save();refreshTodos();}
    addRow.appendChild(addInp);addRow.appendChild(addB);
    p.appendChild(addRow);
  },false);

  // Panel 2: files
  makeTab("Skrár",function(p){
    var fileInp=document.getElementById("task-file");
    var listEl2=el("div","files-list");
    function refreshFiles(){
      listEl2.innerHTML="";
      if(!t.files.length){var empty=el("div","");empty.style.cssText="font-size:13px;color:var(--muted);padding:8px 0";empty.textContent="Engar skrár enn";listEl2.appendChild(empty);return;}
      t.files.forEach(function(f,i){
        var ext=(f.name.split(".").pop()||"").toLowerCase();
        var icons={pdf:"📄",jpg:"🖼",jpeg:"🖼",png:"🖼",gif:"🖼",webp:"🖼",doc:"📝",docx:"📝",xls:"📊",xlsx:"📊"};
        var row=el("div","file-item");
        row.appendChild(el("span","file-icon",icons[ext]||"📎"));
        row.appendChild(el("span","file-name",f.name));
        row.appendChild(el("span","file-size",fmtSize(f.size)));
        var del3=btn("file-del","×",function(){t.files.splice(i,1);save();refreshFiles();});
        row.appendChild(del3);
        listEl2.appendChild(row);
      });
    }
    refreshFiles();
    var upBtn=el("div","file-up","📎 Smelltu til að hlaða upp skrá");
    upBtn.addEventListener("click",function(){
      fileInp.value="";
      fileInp.onchange=function(e){
        Array.from(e.target.files).forEach(function(file){t.files.push({name:file.name,size:file.size});});
        save();refreshFiles();
      };
      fileInp.click();
    });
    p.appendChild(upBtn);
    p.appendChild(listEl2);
  },false);

  wrap.appendChild(tabsEl);
  wrap.appendChild(panelsEl);

  var foot=[
    btn("btn-del","Eyða",function(){
      var obj2=proj().objectives.find(function(o){return o.id===oid;});
      obj2.tasks=obj2.tasks.filter(function(x){return x.id!==tid;});
      save();closeModal();renderCT();
    }),
    btn("btn-cancel","Hætta við",closeModal),
    btn("btn-primary","Vista",function(){
      t.name=f1.value.trim()||t.name;
      t.desc=f2.value;
      t.priority=f3.value;
      t.due=f4.value;
      t.status=f5.value;
      save();closeModal();renderCT();
    })
  ];
  openModal(t.name,wrap,foot,true);
}

function toggleSidebar(){
  var sb = document.getElementById('sb');
  sb.classList.toggle('open');
}
function render(){renderSB();renderBC();renderCT();}
load();render();
</script>
</body>
</html>
