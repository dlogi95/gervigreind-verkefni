<!DOCTYPE html>
<html lang="is">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verkefni — NTV Promennt</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --red: #C0392B; --red-light: #fdf2f1; --red-mid: #f5c6c2;
  --dark: #1a1a2e; --text: #1a1a2e;
  --muted: #7f8c9a; --border: #e8ecef; --bg: #f7f8fa; --white: #ffffff;
  --green: #27ae60; --green-light: #eafaf1;
  --amber: #f39c12; --blue: #2980b9; --blue-light: #eaf4fb;
}
body { font-family: "DM Sans", sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

header {
  background: var(--dark); padding: 0 1.5rem;
  display: flex; align-items: center; height: 56px;
  position: sticky; top: 0; z-index: 100;
}
.logo { display: flex; align-items: center; gap: 8px; }
.logo-badge { background: var(--red); color: white; font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 4px; }
.logo-text { color: rgba(255,255,255,0.85); font-size: 14px; font-weight: 500; }

.breadcrumb {
  background: var(--white); border-bottom: 1px solid var(--border);
  padding: 0 1.5rem; display: flex; align-items: center; gap: 6px;
  height: 44px; font-size: 13px;
}
.bc-item { color: var(--muted); cursor: pointer; }
.bc-item:hover { color: var(--red); }
.bc-item.active { color: var(--text); font-weight: 500; cursor: default; }
.bc-sep { color: var(--border); font-size: 16px; }

.layout { display: flex; height: calc(100vh - 100px); }

.sidebar {
  width: 260px; min-width: 260px; background: var(--white);
  border-right: 1px solid var(--border); overflow-y: auto;
  display: flex; flex-direction: column;
}
.sidebar-section { padding: 1rem; border-bottom: 1px solid var(--border); }
.sidebar-label { font-size: 10px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
.sidebar-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 10px; border-radius: 8px; cursor: pointer; margin-bottom: 2px;
}
.sidebar-item:hover { background: var(--bg); }
.sidebar-item.active { background: var(--red-light); }
.sidebar-item-name { font-size: 13px; font-weight: 500; }
.sidebar-item.active .sidebar-item-name { color: var(--red); }
.sidebar-item-count { font-size: 11px; font-family: "DM Mono", monospace; color: var(--muted); background: var(--bg); padding: 1px 6px; border-radius: 8px; }
.btn-add-small {
  width: 100%; background: none; border: 1px dashed var(--border);
  border-radius: 8px; padding: 7px; font-size: 12px; color: var(--muted);
  cursor: pointer; font-family: "DM Sans", sans-serif; margin-top: 4px;
}
.btn-add-small:hover { border-color: var(--red); color: var(--red); }

.content { flex: 1; overflow-y: auto; padding: 1.5rem; }

/* COVER BANNER */
.cover-banner {
  width: 100%; height: 180px; border-radius: 12px; margin-bottom: 1.5rem;
  overflow: hidden; position: relative; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  border: 1.5px dashed var(--border); background: var(--bg);
}
.cover-banner.has-cover { cursor: default; border-style: solid; }
.cover-banner:not(.has-cover):hover { border-color: var(--red); }
.cover-banner img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
.cover-placeholder { display: flex; flex-direction: column; align-items: center; gap: 6px; color: var(--muted); text-align: center; position: relative; }
.cover-placeholder-icon { font-size: 32px; }
.cover-placeholder-text { font-size: 12px; }
.cover-actions {
  position: absolute; bottom: 10px; right: 10px;
  display: flex; gap: 6px; align-items: center; z-index: 2;
}
.cover-btn {
  background: rgba(255,255,255,0.93); border: 1px solid var(--border);
  border-radius: 6px; padding: 4px 10px; font-size: 11px;
  font-family: "DM Sans", sans-serif; cursor: pointer; font-weight: 500;
}
.cover-btn:hover { background: white; }
.cover-btn.red { color: var(--red); border-color: var(--red-mid); }
.color-wrap {
  display: flex; align-items: center; gap: 5px;
  background: rgba(255,255,255,0.93); border: 1px solid var(--border);
  border-radius: 6px; padding: 3px 8px;
}
.color-wrap input[type=color] { width: 18px; height: 18px; border: none; padding: 0; background: none; cursor: pointer; border-radius: 3px; }
.color-wrap input[type=text] { width: 64px; border: none; font-size: 11px; font-family: "DM Mono", monospace; background: none; outline: none; color: var(--text); }
#cover-file { display: none; }

/* PROJECT */
.project-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 1.5rem; }
.project-title { font-size: 22px; font-weight: 600; margin-bottom: 4px; }
.project-meta { font-size: 13px; color: var(--muted); }
.btn-primary { background: var(--red); color: white; border: none; padding: 8px 16px; border-radius: 8px; font-size: 13px; font-family: "DM Sans", sans-serif; font-weight: 500; cursor: pointer; }
.btn-primary:hover { opacity: 0.85; }

.users-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 12px; margin-bottom: 1.5rem; }
.user-card { background: var(--white); border: 1px solid var(--border); border-radius: 12px; padding: 16px; cursor: pointer; }
.user-card:hover { border-color: var(--red); transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,0.08); }
.user-avatar { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 600; margin-bottom: 10px; }
.user-name { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
.user-stats { font-size: 12px; color: var(--muted); }

.objective-block { background: var(--white); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 12px; overflow: hidden; }
.objective-header { padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
.objective-header:hover { background: var(--bg); }
.objective-left { display: flex; align-items: center; gap: 10px; }
.obj-chevron { font-size: 11px; color: var(--muted); transition: transform 0.2s; display: inline-block; }
.obj-chevron.open { transform: rotate(90deg); }
.objective-name { font-size: 14px; font-weight: 600; }
.objective-right { display: flex; align-items: center; gap: 8px; }
.obj-progress { font-size: 11px; font-family: "DM Mono", monospace; color: var(--muted); background: var(--bg); padding: 2px 8px; border-radius: 8px; }
.obj-edit-btn { background: none; border: none; color: var(--muted); font-size: 13px; cursor: pointer; padding: 2px 8px; border-radius: 4px; }
.obj-edit-btn:hover { background: var(--bg); color: var(--text); }
.obj-tasks { border-top: 1px solid var(--border); }
.task-row { display: flex; align-items: center; gap: 10px; padding: 10px 16px; border-bottom: 1px solid var(--border); cursor: pointer; }
.task-row:last-child { border-bottom: none; }
.task-row:hover { background: var(--bg); }
.task-check { width: 16px; height: 16px; border-radius: 4px; border: 1.5px solid var(--border); display: flex; align-items: center; justify-content: center; flex-shrink: 0; cursor: pointer; }
.task-check.done { background: var(--green); border-color: var(--green); }
.task-check.done::after { content: "✓"; color: white; font-size: 10px; }
.task-check.progress { background: var(--blue); border-color: var(--blue); }
.task-check.progress::after { content: "●"; color: white; font-size: 8px; }
.task-name { flex: 1; font-size: 13px; font-weight: 500; }
.task-name.strikethrough { text-decoration: line-through; color: var(--muted); }
.task-badges { display: flex; align-items: center; gap: 6px; }
.badge { font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 4px; font-family: "DM Mono", monospace; }
.badge-high { background: #fdf2f1; color: #C0392B; }
.badge-mid { background: #fef9ec; color: #f39c12; }
.badge-low { background: #f0f7ee; color: #27ae60; }
.due { font-size: 11px; color: var(--muted); font-family: "DM Mono", monospace; }
.due.overdue { color: var(--red); font-weight: 500; }
.add-task-row { padding: 10px 16px; font-size: 12px; color: var(--muted); cursor: pointer; border-top: 1px dashed var(--border); }
.add-task-row:hover { color: var(--red); }
.empty { text-align: center; padding: 3rem 1rem; color: var(--muted); }
.empty-icon { font-size: 36px; margin-bottom: 12px; }
.av-0 { background: #eaf4fb; color: #2980b9; }
.av-1 { background: #fef0ea; color: #C0392B; }
.av-2 { background: #eafaf1; color: #27ae60; }
.av-3 { background: #fef9ec; color: #f39c12; }
.av-4 { background: #f0eefa; color: #8e44ad; }

/* MODAL */
.overlay { display: none; position: fixed; inset: 0; background: rgba(26,26,46,0.5); z-index: 300; align-items: center; justify-content: center; padding: 1rem; }
.overlay.open { display: flex; }
.modal { background: var(--white); border-radius: 14px; width: 100%; max-width: 460px; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
.modal-header { padding: 18px 20px 14px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.modal-title { font-size: 15px; font-weight: 600; }
.modal-x { background: none; border: none; color: var(--muted); font-size: 20px; cursor: pointer; }
.modal-body { padding: 18px 20px; display: flex; flex-direction: column; gap: 14px; }
.modal-footer { padding: 14px 20px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; align-items: center; }
.fg { display: flex; flex-direction: column; gap: 5px; }
.fl { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
.fi, .fs, .ft { border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; font-size: 13px; font-family: "DM Sans", sans-serif; color: var(--text); background: var(--white); outline: none; }
.fi:focus, .fs:focus, .ft:focus { border-color: var(--red); }
.ft { resize: vertical; min-height: 70px; }
.fr { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.btn-cancel { background: none; border: 1px solid var(--border); color: var(--muted); padding: 7px 14px; border-radius: 8px; font-size: 13px; font-family: "DM Sans", sans-serif; cursor: pointer; }
.btn-cancel:hover { border-color: var(--text); color: var(--text); }
.btn-del { background: none; border: 1px solid var(--red-mid); color: var(--red); padding: 7px 14px; border-radius: 8px; font-size: 13px; font-family: "DM Sans", sans-serif; cursor: pointer; margin-right: auto; }
.btn-del:hover { background: var(--red-light); }

/* TASK DETAIL MODAL */
.modal-lg { max-width: 680px; max-height: 85vh; display: flex; flex-direction: column; }
.modal-tabs { display: flex; border-bottom: 1px solid var(--border); padding: 0 20px; }
.modal-tab { padding: 10px 16px; font-size: 13px; font-weight: 500; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; }
.modal-tab.active { color: var(--red); border-bottom-color: var(--red); }
.modal-tab-panels { flex: 1; overflow-y: auto; padding: 18px 20px; }
.modal-panel { display: none; flex-direction: column; gap: 14px; }
.modal-panel.active { display: flex; }
.todo-list { display: flex; flex-direction: column; gap: 6px; }
.todo-item { display: flex; align-items: center; gap: 8px; padding: 8px 10px; background: var(--bg); border-radius: 8px; }
.todo-check { width: 16px; height: 16px; border-radius: 4px; border: 1.5px solid var(--border); flex-shrink: 0; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.todo-check.checked { background: var(--green); border-color: var(--green); }
.todo-check.checked::after { content: "✓"; color: white; font-size: 10px; }
.todo-text { flex: 1; font-size: 13px; }
.todo-del { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 16px; padding: 0 4px; }
.todo-del:hover { color: var(--red); }
.todo-add { display: flex; gap: 8px; margin-top: 4px; }
.todo-add input { flex: 1; }
.files-list { display: flex; flex-direction: column; gap: 6px; }
.file-item { display: flex; align-items: center; gap: 10px; padding: 8px 12px; background: var(--bg); border-radius: 8px; }
.file-icon { font-size: 18px; flex-shrink: 0; }
.file-name { flex: 1; font-size: 13px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.file-size { font-size: 11px; color: var(--muted); font-family: "DM Mono", monospace; }
.file-del { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 16px; padding: 0 4px; }
.file-del:hover { color: var(--red); }
.file-upload-btn { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 12px; border: 1.5px dashed var(--border); border-radius: 8px; cursor: pointer; color: var(--muted); font-size: 13px; }
.file-upload-btn:hover { border-color: var(--red); color: var(--red); }
#task-file-input { display: none; }
</style>
</head>

</header>

<div class="breadcrumb" id="bc"></div>

<div class="layout">
  <div class="sidebar" id="sb"></div>
  <div class="content" id="ct"></div>
</div>

<input type="file" id="cover-file" accept="image/*">

<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="m-title"></div>
      <button class="modal-x" onclick="closeModal()">x</button>
    </div>
    <div class="modal-body" id="m-body"></div>
    <div class="modal-footer" id="m-foot"></div>
  </div>
</div>

<script>
const KEY = "ntv_pm3";

let db = { projects: [{
  id: 1, name: "Gervigreind í dag", desc: "Facebook hópur um gervigreind",
  users: [
    { id: "u1", name: "Darri", color: 0 },
    { id: "u2", name: "Óli", color: 1 }
  ],
  objectives: [
    { id: "o1", name: "Content", userId: "u2", open: true, tasks: [
      { id: "t1", name: "Claude content — föst dagskrá", priority: "high", due: "2025-05-31", status: "progress" },
      { id: "t2", name: "Velkominn póst", priority: "high", due: "2025-05-06", status: "done" }
    ]},
    { id: "o2", name: "Auglýsingar", userId: "u1", open: true, tasks: [
      { id: "t3", name: "Meta re-target auglýsing", priority: "high", due: "2025-05-10", status: "progress" },
      { id: "t4", name: "Facebook post / story", priority: "mid", due: "2025-05-08", status: "todo" }
    ]},
    { id: "o3", name: "Kynning", userId: "u2", open: true, tasks: [
      { id: "t5", name: "Útvarpsviðtal", priority: "mid", due: "2025-05-15", status: "todo" },
      { id: "t6", name: "Póstar á FB, IG, TikTok", priority: "high", due: "2025-05-07", status: "todo" }
    ]}
  ]
}]};

let state = { pid: 1, uid: null };

function load() { try { const s = localStorage.getItem(KEY); if (s) db = JSON.parse(s); } catch(e){} }
function save() { localStorage.setItem(KEY, JSON.stringify(db)); }
function proj() { return db.projects.find(p => p.id === state.pid); }
function usr() { return state.uid ? proj().users.find(u => u.id === state.uid) : null; }
function ini(n) { return n.split(" ").map(w => w[0]).join("").slice(0,2).toUpperCase(); }
function avCls(c) { return "av-" + (c % 5); }
function isOD(d, s) { return d && s !== "done" && new Date(d) < new Date(); }
function fmtD(d) { if (!d) return ""; const [y,m,day] = d.split("-"); return day+"."+m+"."+y; }
function priB(p) {
  const m = { high: ["badge-high","Hár"], mid: ["badge-mid","Miðlungs"], low: ["badge-low","Lágur"] };
  const [c,l] = m[p] || m.mid;
  return '<span class="badge ' + c + '">' + l + "</span>";
}
function objsFor(uid) { return proj().objectives.filter(o => o.userId === uid); }

// ── COVER ──────────────────────────────────────────────────────
function getCoverImg() { return localStorage.getItem("ntv_cover_img") || ""; }
function getCoverColor() { return localStorage.getItem("ntv_cover_color") || ""; }

function renderCover() {
  const img = getCoverImg();
  const col = getCoverColor();
  const hasCover = img || col;
  const ban = document.getElementById("cover-ban");
  if (!ban) return;

  let style = "";
  if (img) { style = "border-style:solid;border-color:var(--border)"; }
  else if (col) { style = "background:" + col + ";border-style:solid;border-color:transparent"; }

  ban.className = "cover-banner" + (hasCover ? " has-cover" : "");
  ban.setAttribute("style", style);
  ban.onclick = hasCover ? null : function() { document.getElementById("cover-file").click(); };

  const imgEl = ban.querySelector("img");
  if (img) {
    if (!imgEl) { const i = document.createElement("img"); ban.insertBefore(i, ban.firstChild); ban.querySelector("img").src = img; }
    else { imgEl.src = img; }
  } else {
    if (imgEl) imgEl.remove();
  }

  const ph = ban.querySelector(".cover-placeholder");
  if (ph) ph.style.display = hasCover ? "none" : "flex";

  // sync color inputs
  const colorVal = col || "#1a1a2e";
  const ci = ban.querySelector("input[type=color]");
  const ti = ban.querySelector("input[type=text]");
  if (ci) ci.value = colorVal;
  if (ti) ti.value = colorVal;

  // remove btn
  const rb = ban.querySelector(".cover-btn.red");
  if (rb) rb.style.display = hasCover ? "inline-block" : "none";
}

function setCoverColor(hex) {
  if (!hex.match(/^#[0-9a-fA-F]{6}$/)) return;
  localStorage.setItem("ntv_cover_color", hex);
  localStorage.removeItem("ntv_cover_img");
  renderCover();
}

function removeCover() {
  localStorage.removeItem("ntv_cover_img");
  localStorage.removeItem("ntv_cover_color");
  document.getElementById("cover-file").value = "";
  renderCover();
}

document.getElementById("cover-file").addEventListener("change", function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    localStorage.setItem("ntv_cover_img", ev.target.result);
    localStorage.removeItem("ntv_cover_color");
    renderCover();
  };
  reader.readAsDataURL(file);
});

// ── SIDEBAR ────────────────────────────────────────────────────
function renderSB() {
  const p = proj();
  let h = '<div class="sidebar-section"><div class="sidebar-label">Verkefni</div>';
  db.projects.forEach(function(pr) {
    h += '<div class="sidebar-item' + (pr.id === state.pid ? " active" : "") + '" onclick="selP(' + pr.id + ')">'
      + '<span class="sidebar-item-name">' + pr.name + '</span>'
      + '<span class="sidebar-item-count">' + pr.objectives.length + '</span></div>';
  });
  h += '<button class="btn-add-small" onclick="mAddProject()">+ Nýtt verkefni</button></div>';
  if (p) {
    h += '<div class="sidebar-section"><div class="sidebar-label">Notendur</div>';
    p.users.forEach(function(u) {
      h += '<div class="sidebar-item' + (state.uid === u.id ? " active" : "") + '" onclick="selU(\'' + u.id + '\')">'
        + '<span class="sidebar-item-name">' + u.name + '</span>'
        + '<span class="sidebar-item-count">' + objsFor(u.id).length + '</span></div>';
    });
    h += '<div class="sidebar-item' + (!state.uid ? " active" : "") + '" onclick="selU(null)">'
      + '<span class="sidebar-item-name" style="color:var(--muted)">Allir</span></div>';
    h += '<button class="btn-add-small" onclick="mAddUser()">+ Nýr notandi</button></div>';
  }
  document.getElementById("sb").innerHTML = h;
}

// ── BREADCRUMB ─────────────────────────────────────────────────
function renderBC() {
  const p = proj(); const u = usr();
  let h = '<span class="bc-item' + (!p ? " active" : "") + '" onclick="selP(' + state.pid + ')">Verkefni</span>';
  if (p) h += '<span class="bc-sep">›</span><span class="bc-item' + (!u ? " active" : "") + '" onclick="selU(null)">' + p.name + '</span>';
  if (u) h += '<span class="bc-sep">›</span><span class="bc-item active">' + u.name + '</span>';
  document.getElementById("bc").innerHTML = h;
}

// ── CONTENT ────────────────────────────────────────────────────
function renderCT() {
  const p = proj();
  const ct = document.getElementById("ct");
  if (!p) { ct.innerHTML = '<div class="empty"><div class="empty-icon">📁</div><div>Veldu verkefni</div></div>'; return; }

  const u = usr();
  const objs = u ? objsFor(u.id) : p.objectives;
  const title = u ? u.name : p.name;
  const sub = u ? p.name : (p.users.length + " notendur · " + p.objectives.length + " objectives");

  const col = getCoverColor() || "#1a1a2e";

  let h = '<div class="cover-banner" id="cover-ban">'
    + '<div class="cover-placeholder" style="display:flex;flex-direction:column;align-items:center;gap:6px;color:var(--muted)">'
    + '<div style="font-size:32px">🖼</div><div style="font-size:12px">Smelltu til að hlaða upp mynd eða veldu lit</div></div>'
    + '<div class="cover-actions">'
    + '<div class="color-wrap" onclick="event.stopPropagation()">'
    + '<input type="color" value="' + col + '" oninput="setCoverColor(this.value)" onchange="setCoverColor(this.value)">'
    + '<input type="text" value="' + col + '" maxlength="7" placeholder="#000000" oninput="handleHex(this.value)" style="width:64px">'
    + '</div>'
    + '<button class="cover-btn" onclick="event.stopPropagation();document.getElementById(\'cover-file\').click()">Hlaða upp mynd</button>'
    + '<button class="cover-btn red" onclick="event.stopPropagation();removeCover()" style="display:none">Fjarlægja</button>'
    + '</div></div>';

  h += '<div class="project-header"><div>'
    + '<div class="project-title">' + title + '</div>'
    + '<div class="project-meta">' + sub + '</div></div>'
    + '<div style="display:flex;gap:8px">'
    + (!u ? '<button class="btn-primary" onclick="mAddUser()">+ Notandi</button>' : "")
    + '<button class="btn-primary" onclick="mAddObj(\'' + (u ? u.id : "") + '\')">+ Objective</button>'
    + '</div></div>';

  if (!u) {
    h += '<div class="users-grid">';
    p.users.forEach(function(uu) {
      const uobjs = objsFor(uu.id);
      const tasks = uobjs.flatMap(function(o) { return o.tasks; });
      const done = tasks.filter(function(t) { return t.status === "done"; }).length;
      h += '<div class="user-card" onclick="selU(\'' + uu.id + '\')">'
        + '<div class="user-avatar ' + avCls(uu.color) + '">' + ini(uu.name) + '</div>'
        + '<div class="user-name">' + uu.name + '</div>'
        + '<div class="user-stats">' + uobjs.length + " objectives · " + done + "/" + tasks.length + " verkþættir</div></div>";
    });
    h += "</div>";
  }

  if (objs.length === 0) {
    h += '<div class="empty"><div class="empty-icon">🎯</div><div>Engin objectives enn</div></div>';
  } else {
    objs.forEach(function(obj) { h += renderObj(obj); });
  }

  ct.innerHTML = h;
  renderCover();
}

function renderObj(obj) {
  const p = proj();
  const u = p.users.find(function(u) { return u.id === obj.userId; });
  const done = obj.tasks.filter(function(t) { return t.status === "done"; }).length;
  let h = '<div class="objective-block"><div class="objective-header" onclick="toggleObj(\'' + obj.id + '\')">'
    + '<div class="objective-left">'
    + '<span class="obj-chevron' + (obj.open ? " open" : "") + '">▶</span>'
    + '<span class="objective-name">' + obj.name + '</span>'
    + (u ? '<div class="user-avatar ' + avCls(u.color) + '" style="width:22px;height:22px;font-size:10px;margin:0">' + ini(u.name) + '</div>' : "")
    + '</div><div class="objective-right">'
    + '<span class="obj-progress">' + done + "/" + obj.tasks.length + '</span>'
    + '<button class="obj-edit-btn" onclick="event.stopPropagation();mEditObj(\'' + obj.id + '\')">···</button>'
    + '</div></div>';
  if (obj.open) {
    h += '<div class="obj-tasks">';
    obj.tasks.forEach(function(t) { h += renderTask(t, obj.id); });
    h += '<div class="add-task-row" onclick="mAddTask(\'' + obj.id + '\')">+ Bæta við verkþætti</div>';
    h += '</div>';
  }
  h += '</div>';
  return h;
}

function renderTask(t, objId) {
  const od = isOD(t.due, t.status);
  return '<div class="task-row" onclick="mEditTask(\'' + objId + '\',\'' + t.id + '\')">'
    + '<div class="task-check ' + t.status + '" onclick="event.stopPropagation();cycleS(\'' + objId + '\',\'' + t.id + '\')"></div>'
    + '<span class="task-name' + (t.status === "done" ? " strikethrough" : "") + '">' + t.name + '</span>'
    + '<div class="task-badges">' + priB(t.priority)
    + (t.due ? '<span class="due' + (od ? " overdue" : "") + '">' + fmtD(t.due) + '</span>' : "")
    + '</div></div>';
}

// ── ACTIONS ────────────────────────────────────────────────────
function selP(id) { state.pid = id; state.uid = null; render(); }
function selU(id) { state.uid = id; render(); }
function toggleObj(id) { const o = proj().objectives.find(function(o) { return o.id === id; }); if(o) o.open = !o.open; save(); renderCT(); }
function cycleS(oid, tid) {

function openModal(title, body, foot) {
  document.getElementById("m-title").textContent = title;
  document.getElementById("m-body").innerHTML = body;
  document.getElementById("m-foot").innerHTML = foot;
  document.getElementById("overlay").classList.add("open");
}
function closeModal() { document.getElementById("overlay").classList.remove("open"); document.querySelector(".modal").classList.remove("modal-lg"); }
document.getElementById("overlay").addEventListener("click", function(e) { if (e.target === this) closeModal(); });

let _curOid = null, _curTid = null;

function mEditTask(oid, tid) {
  _curOid = oid; _curTid = tid;
  const obj = proj().objectives.find(function(o) { return o.id === oid; });
  const t = obj.tasks.find(function(t) { return t.id === tid; });
  if (!t.todos) t.todos = [];
  if (!t.files) t.files = [];

  document.querySelector(".modal").classList.add("modal-lg");

  // Build body using DOM to avoid all quote issues
  const wrap = document.createElement("div");

  // Tabs
  const tabs = document.createElement("div");
  tabs.className = "modal-tabs";
  ["Upplýsingar","To-do listi","Skrár"].forEach(function(lbl, i) {
    const tab = document.createElement("div");
    tab.className = "modal-tab" + (i===0?" active":"");
    tab.textContent = lbl;
    tab.onclick = function() { switchTab(i); };
    tabs.appendChild(tab);
  });
  wrap.appendChild(tabs);

  // Panels container
  const panels = document.createElement("div");
  panels.className = "modal-tab-panels";

  // Panel 0: info
  const p0 = document.createElement("div");
  p0.className = "modal-panel active";
  p0.id = "tp0";
  p0.innerHTML =
    '<div class="fg"><label class="fl">Heiti</label><input class="fi" id="f1"></div>'
    + '<div class="fg"><label class="fl">Lýsing</label><textarea class="ft" id="f-desc" placeholder="Nánari lýsing..."></textarea></div>'
    + '<div class="fr">'
    + '<div class="fg"><label class="fl">Forgangur</label><select class="fs" id="f2">'
    + '<option value="high">Hár</option><option value="mid">Miðlungs</option><option value="low">Lágur</option>'
    + '</select></div>'
    + '<div class="fg"><label class="fl">Skiladagur</label><input class="fi" id="f3" type="date"></div>'
    + '</div>'
    + '<div class="fg"><label class="fl">Staða</label><select class="fs" id="f4">'
    + '<option value="todo">Bið</option><option value="progress">Í vinnslu</option><option value="done">Klárt</option>'
    + '</select></div>';
  panels.appendChild(p0);

  // Set values after insert
  // Panel 1: todos
  const p1 = document.createElement("div");
  p1.className = "modal-panel";
  p1.id = "tp1";
  const todoList = document.createElement("div");
  todoList.className = "todo-list";
  todoList.id = "todo-list";
  p1.appendChild(todoList);
  const todoAdd = document.createElement("div");
  todoAdd.className = "todo-add";
  const todoInp = document.createElement("input");
  todoInp.className = "fi";
  todoInp.id = "todo-input";
  todoInp.placeholder = "Bæta við lið...";
  todoInp.addEventListener("keydown", function(e) { if (e.key === "Enter") addTodoItem(); });
  const todoBtn = document.createElement("button");
  todoBtn.className = "btn-primary";
  todoBtn.textContent = "+";
  todoBtn.onclick = addTodoItem;
  todoAdd.appendChild(todoInp);
  todoAdd.appendChild(todoBtn);
  p1.appendChild(todoAdd);
  panels.appendChild(p1);

  // Panel 2: files
  const p2 = document.createElement("div");
  p2.className = "modal-panel";
  p2.id = "tp2";
  const fileInp = document.createElement("input");
  fileInp.type = "file";
  fileInp.id = "task-file-input";
  fileInp.multiple = true;
  fileInp.addEventListener("change", handleTaskFiles);
  const fileUpBtn = document.createElement("div");
  fileUpBtn.className = "file-upload-btn";
  fileUpBtn.textContent = "Smelltu til að hlaða upp skrá";
  fileUpBtn.onclick = function() { document.getElementById("task-file-input").click(); };
  const fileList = document.createElement("div");
  fileList.className = "files-list";
  fileList.id = "files-list";
  p2.appendChild(fileInp);
  p2.appendChild(fileUpBtn);
  p2.appendChild(fileList);
  panels.appendChild(p2);

  wrap.appendChild(panels);

  openModal(t.name, "", '<button class="btn-del" onclick="delTask()">Eyða</button><button class="btn-cancel" onclick="closeModal()">Hætta við</button><button class="btn-primary" onclick="updTask()">Vista</button>');
  document.getElementById("m-body").innerHTML = "";
  document.getElementById("m-body").appendChild(wrap);

  // Set field values
  document.getElementById("f1").value = t.name;
  document.getElementById("f-desc").value = t.desc || "";
  document.getElementById("f2").value = t.priority;
  document.getElementById("f3").value = t.due || "";
  document.getElementById("f4").value = t.status;

  // Render todos and files
  document.getElementById("todo-list").innerHTML = renderTodoItems(t.todos);
  document.getElementById("files-list").innerHTML = renderFileItems(t.files);
}
function switchTab(idx) {
  document.querySelectorAll(".modal-tab").forEach(function(t,i) { t.classList.toggle("active", i===idx); });
  document.querySelectorAll(".modal-panel").forEach(function(p,i) { p.classList.toggle("active", i===idx); });
}

function renderTodoItems(todos) {
  if (!todos || !todos.length) return '<div style="font-size:13px;color:var(--muted);padding:8px 0">Engir liðir enn</div>';
  return todos.map(function(item, i) {
    return '<div class="todo-item">'
      + '<div class="todo-check' + (item.done ? " checked" : "") + '" onclick="toggleTodo(' + i + ')"></div>'
      + '<span class="todo-text" style="' + (item.done ? "text-decoration:line-through;color:var(--muted)" : "") + '">' + item.text + '</span>'
      + '<button class="todo-del" onclick="deleteTodo(' + i + ')">×</button>'
      + '</div>';
  }).join("");
}

function renderFileItems(files) {
  if (!files || !files.length) return '<div style="font-size:13px;color:var(--muted);padding:8px 0">Engar skrár enn</div>';
  return files.map(function(f, i) {
    const ext = f.name.split(".").pop().toLowerCase();
    const icon = ["pdf"].includes(ext) ? "📄" : ["jpg","jpeg","png","gif","webp"].includes(ext) ? "🖼" : ["doc","docx"].includes(ext) ? "📝" : ["xls","xlsx"].includes(ext) ? "📊" : "📎";
    return '<div class="file-item">'
      + '<span class="file-icon">' + icon + '</span>'
      + '<span class="file-name">' + f.name + '</span>'
      + '<span class="file-size">' + fmtSize(f.size) + '</span>'
      + '<button class="file-del" onclick="deleteFile(' + i + ')">×</button>'
      + '</div>';
  }).join("");
}

function fmtSize(bytes) {
  if (!bytes) return "";
  if (bytes < 1024) return bytes + " B";
  if (bytes < 1024*1024) return Math.round(bytes/1024) + " KB";
  return (bytes/(1024*1024)).toFixed(1) + " MB";
}

function getTask() {
  const obj = proj().objectives.find(function(o) { return o.id === _curOid; });
  return obj.tasks.find(function(t) { return t.id === _curTid; });
}

function addTodoItem() {
  const input = document.getElementById("todo-input");
  const text = input.value.trim();
  if (!text) return;
  const t = getTask();
  if (!t.todos) t.todos = [];
  t.todos.push({ text: text, done: false });
  input.value = "";
  save();
  document.getElementById("todo-list").innerHTML = renderTodoItems(t.todos);
}

function toggleTodo(idx) {
  const t = getTask();
  t.todos[idx].done = !t.todos[idx].done;
  save();
  document.getElementById("todo-list").innerHTML = renderTodoItems(t.todos);
}

function deleteTodo(idx) {
  const t = getTask();
  t.todos.splice(idx, 1);
  save();
  document.getElementById("todo-list").innerHTML = renderTodoItems(t.todos);
}

function handleTaskFiles(event) {
  const t = getTask();
  if (!t.files) t.files = [];
  Array.from(event.target.files).forEach(function(file) {
    // Store name and size only (not content — keeps localStorage light)
    t.files.push({ name: file.name, size: file.size });
  });
  save();
  document.getElementById("files-list").innerHTML = renderFileItems(t.files);
  document.getElementById("task-file-input").value = "";
}

function deleteFile(idx) {
  const t = getTask();
  t.files.splice(idx, 1);
  save();
  document.getElementById("files-list").innerHTML = renderFileItems(t.files);
}

function updTask() {
  const t = getTask();
  t.name = gv("f1") || t.name;
  t.desc = document.getElementById("f-desc").value;
  t.priority = document.getElementById("f2").value;
  t.due = document.getElementById("f3").value;
  t.status = document.getElementById("f4").value;
  save();
  document.querySelector(".modal").classList.remove("modal-lg");
  closeModal(); renderCT();
}

function delTask(oid, tid) {
  // called from task row (oid+tid) or from modal (no args, uses _curOid/_curTid)
  const o = oid || _curOid; const ti = tid || _curTid;
  const obj = proj().objectives.find(function(x) { return x.id === o; });
  obj.tasks = obj.tasks.filter(function(t) { return t.id !== ti; });
  save();
  document.querySelector(".modal").classList.remove("modal-lg");
  closeModal(); renderCT();
}

function handleTodoKey(e) { if (e.key === "Enter") addTodoItem(); }
function render() { renderSB(); renderBC(); renderCT(); }
load(); render();
</script>
